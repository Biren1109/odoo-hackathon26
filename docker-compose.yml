version: '3.9'

services:

  postgres:
    image: postgres:15-alpine
    container_name: vendorbridge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vendorbridge
      POSTGRES_PASSWORD: vendorbridge_secret
      POSTGRES_DB: vendorbridge_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendorbridge"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: vendorbridge_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://vendorbridge:vendorbridge_secret@postgres:5432/vendorbridge_dev
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: vendorbridge_frontend
    restart: unless-stopped
    env_file: ./frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: vendorbridge_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
