version: '3.9'

services:

  postgres:
    image: postgres:15-alpine
    container_name: vendorbridge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vendorbridge
      POSTGRES_PASSWORD: vendorbridge_secret
      POSTGRES_DB: vendorbridge_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vendorbridge_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendorbridge"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: vendorbridge_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://vendorbridge:vendorbridge_secret@postgres:5432/vendorbridge_dev
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vendorbridge_net
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    container_name: vendorbridge_frontend
    restart: unless-stopped
    env_file: ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - vendorbridge_net
    command: npm run dev

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: vendorbridge_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - vendorbridge_net

volumes:
  postgres_data:

networks:
  vendorbridge_net:
    driver: bridge
